services:
  - type: web
    name: prediction-market-analysis
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/analyses
    autoDeploy: true
    preDeployCommand: bash scripts/download.sh
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 10
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
