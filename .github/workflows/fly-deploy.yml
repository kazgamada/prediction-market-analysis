name: Deploy to Fly.io

on:
  push:
    branches:
      - main
      - claude/add-page-caching-OkerV
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --app prediction-market-analysis
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
