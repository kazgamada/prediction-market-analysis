name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject build metadata
        run: |
          echo "GIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date -u +%FT%TZ)" >> $GITHUB_ENV

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # Show current state for forensic visibility.
      - name: Show app status before deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl status -a prediction-market-analysis || true
          flyctl machine list -a prediction-market-analysis || true
          flyctl scale show -a prediction-market-analysis || true

      # Ensure every process group has at least one machine. The old app had
      # only `web` + `monitor`; new fly.toml has `web` + `indexer` + `worker`.
      # Without this, deploy hangs waiting on machines for the new groups.
      - name: Scale process groups
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl scale count web=1 indexer=1 worker=1 \
            -a prediction-market-analysis --yes \
          || echo "scale-count returned non-zero (may be fine if app doesn't exist yet)"

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # `immediate` avoids rolling-update timeouts when old machines run a
          # different process layout. After a successful first deploy we can
          # switch this back to `rolling`.
          flyctl deploy --remote-only \
            --build-arg GIT_SHA=${GIT_SHA} \
            --build-arg BUILD_TIME=${BUILD_TIME} \
            --strategy=immediate \
            --wait-timeout=300

      # Non-HTTP process groups (indexer, worker) can be left in `stopped`
      # state by Fly's default policy when they exit between deploys. Force-
      # start anything still stopped after the deploy so background workers
      # actually run.
      - name: Start any stopped machines
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -eu
          flyctl machine list -a prediction-market-analysis --json \
            > /tmp/machines.json
          stopped_ids=$(jq -r '.[] | select(.state != "started") | .id' /tmp/machines.json)
          if [ -z "$stopped_ids" ]; then
            echo "all machines already started"
            exit 0
          fi
          for id in $stopped_ids; do
            grp=$(jq -r --arg id "$id" '.[] | select(.id==$id) | .config.metadata.fly_process_group // "?"' /tmp/machines.json)
            echo "starting machine $id (process_group=$grp)"
            flyctl machine start "$id" -a prediction-market-analysis || true
          done

      - name: Show app status after deploy
        if: always()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl status -a prediction-market-analysis || true
          flyctl machine list -a prediction-market-analysis || true
