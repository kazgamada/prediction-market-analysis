# Fly.io config for the polymarket-copytrader UI + monitor.
#
# Two processes:
#   web      — Streamlit admin UI on port 8501 (public via http_service)
#   monitor  — long-running OrderFilled subscriber + signal emitter
#
# Add `paper` or `live` processes by uncommenting the line below and adding a
# matching [[vm]] block.

app = "prediction-market-analysis"
primary_region = "nrt"

[build]

[env]
  PYTHONUNBUFFERED = "1"
  STREAMLIT_SERVER_PORT = "8501"
  STREAMLIT_SERVER_ADDRESS = "0.0.0.0"
  STREAMLIT_SERVER_HEADLESS = "true"
  STREAMLIT_BROWSER_GATHER_USAGE_STATS = "false"

[processes]
  web     = "sh -c 'alembic upgrade head && streamlit run src/copytrader/web/app.py'"
  monitor = "sh -c 'alembic upgrade head && copytrader monitor'"
  # paper = "sh -c 'alembic upgrade head && copytrader paper --copy-usd 5'"
  # live  = "sh -c 'alembic upgrade head && copytrader live --copy-usd 5 --i-understand-the-risk'"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["web"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  processes = ["web"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["monitor"]

[deploy]
  release_command = "alembic upgrade head"
