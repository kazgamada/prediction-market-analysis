app = 'prediction-market-analysis'
primary_region = 'nrt'

[build]

[env]
  PYTHONUNBUFFERED = '1'
  STREAMLIT_BROWSER_GATHER_USAGE_STATS = 'false'
  STREAMLIT_SERVER_ADDRESS = '0.0.0.0'
  STREAMLIT_SERVER_HEADLESS = 'true'
  STREAMLIT_SERVER_PORT = '8501'

[processes]
  web     = "python -m copytrader.runtime.web_main"
  indexer = "python -m copytrader.runtime.indexer_main"
  worker  = "python -m copytrader.runtime.worker_main"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['web']

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/_stcore/health"
    timeout = "10s"

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 25

# health server (port 8080) は各プロセスが内部で起動するが
# Fly の http_service でのみ外部公開するため [[services]] は使わない (T14)

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  processes = ['web']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  processes = ['indexer']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  processes = ['worker']
