app = 'prediction-market-analysis'
primary_region = 'nrt'

[build]

[env]
  PYTHONUNBUFFERED = '1'
  STREAMLIT_BROWSER_GATHER_USAGE_STATS = 'false'
  STREAMLIT_SERVER_ADDRESS = '0.0.0.0'
  STREAMLIT_SERVER_HEADLESS = 'true'
  STREAMLIT_SERVER_PORT = '8501'

[processes]
  web     = "python -m copytrader.runtime.web_main"
  indexer = "python -m copytrader.runtime.indexer_main"
  worker  = "python -m copytrader.runtime.worker_main"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['web']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 25

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["web"]

  [[services.ports]]
    port = 8080
    handlers = ["http"]

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
  processes = ['web']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  processes = ['indexer']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  processes = ['worker']
